<section id="contact" class="py-5 mt-5 mb-5 text-center" style="padding-bottom: 80px !important;">
  <div class="container">
    <div class="mb-5">
      <h2 class="section-title glow-text d-inline-block">Let's Build Something</h2>
      <p class="text-muted-custom">Have a project in mind or just want to say hi? Drop a message!</p>
    </div>

    <div class="row g-4 justify-content-center text-start">
      
      <!-- Contact Info -->
      <div class="col-lg-5" data-aos="fade-right">
        <div class="glass-card p-5 h-100 d-flex flex-column justify-content-center">
          <h4 class="fw-bold mb-4">Contact Information</h4>
          
          <div class="d-flex align-items-center mb-4">
            <div class="glass-btn me-3 px-3 py-2" style="cursor: default;">📞</div>
            <div>
              <p class="mb-0 text-muted-custom small">Phone</p>
              <p class="mb-0 fw-bold">9345297009</p>
            </div>
          </div>

          <div class="d-flex align-items-center mb-4">
            <div class="glass-btn me-3 px-3 py-2" style="cursor: default;">✉️</div>
            <div>
              <p class="mb-0 text-muted-custom small">Email</p>
              <p class="mb-0 fw-bold">kannansurendar70@gmail.com</p>
            </div>
          </div>

          <div class="d-flex align-items-center mb-4">
            <div class="glass-btn me-3 px-3 py-2" style="cursor: default;">🔗</div>
            <div>
              <p class="mb-0 text-muted-custom small">LinkedIn</p>
              <a href="https://linkedin.com/in/surendar-kannan-844171376" target="_blank" class="text-dynamic text-decoration-none fw-bold">surendar-kannan</a>
            </div>
          </div>

          <div class="d-flex align-items-center">
            <div class="glass-btn me-3 px-3 py-2" style="cursor: default;">💻</div>
            <div>
              <p class="mb-0 text-muted-custom small">GitHub</p>
              <a href="https://github.com/surendar-dev-tech" target="_blank" class="text-dynamic text-decoration-none fw-bold">surendar-dev-tech</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="col-lg-7" data-aos="fade-left" data-aos-delay="200">
        <div class="glass-card p-5 h-100">
          
          <!-- Success Message -->
          <div *ngIf="successMessage" class="alert alert-success glass-card border-success text-success mb-4" role="alert">
            {{ successMessage }}
          </div>

          <!-- Error Message -->
          <div *ngIf="errorMessage" class="alert alert-danger glass-card border-danger text-danger mb-4" role="alert">
            {{ errorMessage }}
          </div>

          <form (ngSubmit)="sendEmail($event)" #contactForm="ngForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label text-muted-custom small mb-1">Your Name</label>
                <input type="text" name="from_name" class="glass-input" placeholder="John Doe" required>
              </div>
              
              <div class="col-md-6">
                <label class="form-label text-muted-custom small mb-1">Your Email</label>
                <input type="email" name="from_email" class="glass-input" placeholder="john@example.com" required>
              </div>

              <div class="col-12">
                <label class="form-label text-muted-custom small mb-1">Message</label>
                <textarea name="message" class="glass-input" rows="5" placeholder="How can I help you?" required></textarea>
              </div>

              <div class="col-12 mt-4">
                <button type="submit" class="glass-btn w-100 py-3 fw-bold d-flex justify-content-center align-items-center" [disabled]="isLoading">
                  <span *ngIf="!isLoading">Send Message</span>
                  <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  <span *ngIf="isLoading">Sending...</span>
                </button>
              </div>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</section>
